<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>8-BALL UNIVERSE 1v1</title>
    <style>
        body { margin: 0; background: #050505; color: #fff; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; touch-action: none; }
        #header { width: 100%; background: #000; padding: 10px; display: flex; justify-content: space-around; align-items: center; border-bottom: 2px solid #00f2ff; }
        #table-container { position: relative; border: 12px solid #3e2723; border-radius: 10px; margin-top: 15px; background: #1b5e20; box-shadow: 0 0 30px #000; }
        canvas { display: block; background: #2e7d32; }
        .badge { padding: 5px 12px; border-radius: 4px; font-weight: bold; font-size: 14px; }
        .my-turn { background: #00f2ff; color: #000; box-shadow: 0 0 10px #00f2ff; }
        .waiting { background: #333; color: #666; }
        #info { font-size: 11px; color: #ff007f; margin: 5px; text-align: center; }
    </style>
</head>
<body>

    <div id="header">
        <div id="status-box" class="badge waiting">CONNECTING...</div>
        <div id="room-display" style="font-weight: bold;">ROOM: ---</div>
    </div>
    <div id="info">COPY FULL URL & SEND TO FRIEND TO PLAY</div>

    <div id="table-container">
        <canvas id="poolCanvas"></canvas>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCQF2laulY6pBKf0uXgHLNU2ymGl1p6h3U",
            authDomain: "talon-a0d64.firebaseapp.com",
            projectId: "talon-a0d64",
            storageBucket: "talon-a0d64.firebasestorage.app",
            messagingSenderId: "231672698092",
            appId: "1:231672698092:web:af84794c858756349bc1c9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const urlParams = new URLSearchParams(window.location.search);
        let roomId = urlParams.get('room');
        const isHost = !roomId;
        if (isHost) {
            roomId = "POOL-" + Math.random().toString(36).substring(2, 7).toUpperCase();
            window.history.pushState({}, '', `?room=${roomId}`);
        }
        document.getElementById('room-display').innerText = roomId;

        const canvas = document.getElementById("poolCanvas");
        const ctx = canvas.getContext("2d");
        canvas.width = Math.min(window.innerWidth - 30, 700);
        canvas.height = canvas.width / 2;
        const ballRadius = canvas.width / 45;

        let balls = [];
        let turn = "host"; 
        let isDragging = false;
        let mousePos = { x: 0, y: 0 };
        const myRole = isHost ? "host" : "guest";

        function createBalls() {
            let b = [{ x: canvas.width * 0.25, y: canvas.height / 2, color: "#fff", num: 0, vx: 0, vy: 0 }];
            for (let i = 1; i <= 8; i++) {
                b.push({ 
                    x: canvas.width * 0.7 + (i * 2), 
                    y: canvas.height / 2 - 40 + (i * 10), 
                    color: i === 8 ? "#000" : `hsl(${i * 45}, 70%, 50%)`, 
                    num: i, vx: 0, vy: 0 
                });
            }
            return b;
        }

        const roomRef = doc(db, "pool_v2", roomId);

        onSnapshot(roomRef, (snap) => {
            if (snap.exists()) {
                const data = snap.data();
                balls = data.balls;
                turn = data.turn;
                const status = document.getElementById("status-box");
                if (turn === myRole) {
                    status.innerText = "YOUR TURN";
                    status.className = "badge my-turn";
                } else {
                    status.innerText = "WAITING...";
                    status.className = "badge waiting";
                }
            } else if (isHost) {
                setDoc(roomRef, { balls: createBalls(), turn: "host" });
            }
        });

        function draw() {
            ctx.fillStyle = "#2e7d32";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Pockets
            ctx.fillStyle = "#000";
            [{x:0,y:0},{x:canvas.width/2,y:0},{x:canvas.width,y:0},{x:0,y:canvas.height},{x:canvas.width/2,y:canvas.height},{x:canvas.width,y:canvas.height}].forEach(p => {
                ctx.beginPath(); ctx.arc(p.x, p.y, ballRadius*1.5, 0, 7); ctx.fill();
            });

            balls.forEach(b => {
                ctx.beginPath();
                ctx.arc(b.x, b.y, ballRadius, 0, 7);
                ctx.fillStyle = b.color;
                ctx.fill();
                if(b.num > 0) {
                    ctx.fillStyle = "white"; ctx.font = "bold 10px Arial";
                    ctx.textAlign = "center"; ctx.fillText(b.num, b.x, b.y+3);
                }
            });

            if (isDragging && turn === myRole) {
                ctx.beginPath();
                ctx.moveTo(balls[0].x, balls[0].y);
                ctx.lineTo(mousePos.x, mousePos.y);
                ctx.strokeStyle = "#00f2ff";
                ctx.stroke();
            }
            requestAnimationFrame(draw);
        }

        async function handleShot() {
            if (!isDragging) return;
            isDragging = false;
            const dx = (balls[0].x - mousePos.x) * 0.12;
            const dy = (balls[0].y - mousePos.y) * 0.12;
            
            // Apply simple physics to balls array
            balls[0].vx = dx; balls[0].vy = dy;
            
            // Instant simulate for sync
            for(let i=0; i<150; i++) {
                balls.forEach(b => {
                    b.x += b.vx || 0; b.y += b.vy || 0;
                    b.vx *= 0.98; b.vy *= 0.98;
                    if(b.x < ballRadius || b.x > canvas.width-ballRadius) b.vx *= -1;
                    if(b.y < ballRadius || b.y > canvas.height-ballRadius) b.vy *= -1;
                });
            }

            await updateDoc(roomRef, {
                balls: balls,
                turn: myRole === "host" ? "guest" : "host"
            });
        }

        const getMouse = (e) => {
            const rect = canvas.getBoundingClientRect();
            const cx = e.touches ? e.touches[0].clientX : e.clientX;
            const cy = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: cx - rect.left, y: cy - rect.top };
        };

        canvas.addEventListener("mousedown", () => { if(turn === myRole) isDragging = true; });
        canvas.addEventListener("touchstart", (e) => { if(turn === myRole) isDragging = true; e.preventDefault(); }, {passive:false});
        window.addEventListener("mousemove", (e) => { mousePos = getMouse(e); });
        window.addEventListener("touchmove", (e) => { mousePos = getMouse(e); });
        window.addEventListener("mouseup", handleShot);
        window.addEventListener("touchend", handleShot);

        draw();
    </script>
</body>
</html>
