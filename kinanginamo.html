<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surprise Button</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #1a1a1a;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        #main-button {
            padding: 20px 40px;
            font-size: 24px;
            font-weight: bold;
            color: white;
            background-color: #ff007f;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(255, 0, 127, 0.5);
            transition: transform 0.2s;
            z-index: 10;
        }

        #main-button:active {
            transform: scale(0.9);
        }

        #emoji-overlay {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            font-size: 50px;
            pointer-events: none;
            transition: transform 1.5s ease-in;
            z-index: 100;
            display: none;
        }

        .show-emoji {
            display: block !important;
            transform: translate(-50%, -50%) scale(50) !important; /* Papalaki ng sobra */
        }

        #warning {
            color: #444;
            position: absolute;
            bottom: 20px;
        }
    </style>
</head>
<body>

    <button id="main-button" onclick="showSurprise()">WAG PINDUTIN</button>
    
    <div id="emoji-overlay">🖕</div>

    <div id="warning">Click at your own risk.</div>

    <script>
        function showSurprise() {
            const emoji = document.getElementById('emoji-overlay');
            const btn = document.getElementById('main-button');
            
            // Itago ang button
            btn.style.display = 'none';
            
            // Ipakita at palakihin ang emoji
            emoji.classList.add('show-emoji');

            // Optional: Mag-shake ang screen
            document.body.style.animation = "shake 0.5s infinite";
        }
    </script>

    <style>
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }
    </style>
</body>
</html>
