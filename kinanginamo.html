<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>8-Ball Global 1v1</title>
    <style>
        body { margin: 0; background: #050505; color: #fff; font-family: 'Arial', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; touch-action: none; }
        #header { width: 100%; position: absolute; top: 0; background: #000; padding: 15px; display: flex; justify-content: space-around; border-bottom: 2px solid #00f2ff; z-index: 10; box-sizing: border-box; }
        #table-wrapper { position: relative; border: 12px solid #3e2723; border-radius: 15px; background: #1b5e20; box-shadow: 0 0 50px #000; }
        canvas { display: block; background: #236b23; cursor: crosshair; }
        .status { padding: 8px 20px; border-radius: 5px; font-weight: bold; font-size: 14px; text-transform: uppercase; }
        .my-turn { background: #00f2ff; color: #000; box-shadow: 0 0 15px #00f2ff; }
        .waiting { background: #333; color: #777; }
        #room-label { position: absolute; bottom: 15px; font-size: 11px; color: #ff007f; font-weight: bold; text-align: center; }
    </style>
</head>
<body>

    <div id="header">
        <div id="turn-display" class="status waiting">SYNCING...</div>
        <div style="text-align: right">
            <div style="font-size: 10px; color: #888;">MATCH ID</div>
            <div id="match-id" style="color: #00f2ff; font-weight: bold;">---</div>
        </div>
    </div>

    <div id="table-wrapper">
        <canvas id="poolCanvas"></canvas>
    </div>

    <div id="room-label">IPASA ANG BUONG URL SA KALABAN PARA MAG-START</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Firebase Config (Verified)
        const firebaseConfig = {
            apiKey: "AIzaSyCQF2laulY6pBKf0uXgHLNU2ymGl1p6h3U",
            authDomain: "talon-a0d64.firebaseapp.com",
            projectId: "talon-a0d64",
            storageBucket: "talon-a0d64.firebasestorage.app",
            messagingSenderId: "231672698092",
            appId: "1:231672698092:web:af84794c858756349bc1c9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const urlParams = new URLSearchParams(window.location.search);
        let roomId = urlParams.get('room');
        const isHost = !roomId;
        
        if (isHost) {
            roomId = "1V1-" + Math.random().toString(36).substring(2, 8).toUpperCase();
            window.history.pushState({}, '', `?room=${roomId}`);
        }
        document.getElementById('match-id').innerText = roomId;

        const canvas = document.getElementById("poolCanvas");
        const ctx = canvas.getContext("2d");
        canvas.width = Math.min(window.innerWidth - 40, 750);
        canvas.height = canvas.width / 2;
        const ballRadius = canvas.width / 48;

        let balls = [];
        let turn = "host"; 
        let isDragging = false;
        let mousePos = { x: 0, y: 0 };
        const myRole = isHost ? "host" : "guest";

        const roomRef = doc(db, "active_1v1_pool", roomId);

        function createInitialRack() {
            let b = [{ x: canvas.width * 0.25, y: canvas.height / 2, color: "#fff", num: 0, vx: 0, vy: 0 }];
            const startX = canvas.width * 0.65;
            const startY = canvas.height / 2;
            let n = 1;
            for (let row = 0; row < 4; row++) {
                for (let col = 0; col <= row; col++) {
                    let color = (n === 5) ? "#000" : `hsl(${n * 40}, 75%, 50%)`;
                    b.push({ x: startX + (row * ballRadius * 1.8), y: startY - (row * ballRadius) + (col * ballRadius * 2.1), color: color, num: n, vx: 0, vy: 0 });
                    n++;
                }
            }
            return b;
        }

        // Listener for real-time updates
        onSnapshot(roomRef, (snapshot) => {
            if (snapshot.exists()) {
                const data = snapshot.data();
                balls = data.balls;
                turn = data.turn;
                updateTurnUI();
            } else if (isHost) {
                setDoc(roomRef, { balls: createInitialRack(), turn: "host" });
            }
        });

        function updateTurnUI() {
            const status = document.getElementById("turn-display");
            status.innerText = (turn === myRole) ? "YOUR TURN" : "OPPONENT'S TURN";
            status.className = (turn === myRole) ? "status my-turn" : "status waiting";
        }

        function draw() {
            ctx.fillStyle = "#236b23";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Pockets
            ctx.fillStyle = "#000";
            [{x:0,y:0},{x:canvas.width/2,y:0},{x:canvas.width,y:0},{x:0,y:canvas.height},{x:canvas.width/2,y:canvas.height},{x:canvas.width,y:canvas.height}].forEach(p => {
                ctx.beginPath(); ctx.arc(p.x, p.y, ballRadius * 1.7, 0, 7); ctx.fill();
            });

            balls.forEach(b => {
                ctx.beginPath(); ctx.arc(b.x, b.y, ballRadius, 0, 7);
                ctx.fillStyle = b.color; ctx.fill();
                if(b.num > 0) {
                    ctx.fillStyle = "white"; ctx.font = `bold ${ballRadius}px Arial`;
                    ctx.textAlign = "center"; ctx.fillText(b.num, b.x, b.y + (ballRadius/2.5));
                }
            });

            if (isDragging && turn === myRole) {
                ctx.beginPath();
                ctx.moveTo(balls[0].x, balls[0].y);
                ctx.lineTo(mousePos.x, mousePos.y);
                ctx.strokeStyle = "#00f2ff"; ctx.lineWidth = 2;
                ctx.setLineDash([5, 5]); ctx.stroke(); ctx.setLineDash([]);
            }
            requestAnimationFrame(draw);
        }

        async function processShot() {
            if (!isDragging) return;
            isDragging = false;
            
            const dx = (balls[0].x - mousePos.x) * 0.15;
            const dy = (balls[0].y - mousePos.y) * 0.15;
            balls[0].vx = dx; balls[0].vy = dy;

            // Physics sync
            for(let step = 0; step < 150; step++) {
                balls.forEach(b => {
                    b.x += b.vx || 0; b.y += b.vy || 0;
                    b.vx *= 0.98; b.vy *= 0.98;
                    if(b.x < ballRadius || b.x > canvas.width - ballRadius) b.vx *= -1;
                    if(b.y < ballRadius || b.y > canvas.height - ballRadius) b.vy *= -1;
                });
                for(let i=0; i<balls.length; i++) {
                    for(let j=i+1; j<balls.length; j++) {
                        if(Math.hypot(balls[i].x - balls[j].x, balls[i].y - balls[j].y) < ballRadius * 2) {
                            let tempX = balls[i].vx; let tempY = balls[i].vy;
                            balls[i].vx = balls[j].vx; balls[i].vy = balls[j].vy;
                            balls[j].vx = tempX; balls[j].vy = tempY;
                        }
                    }
                }
            }

            await updateDoc(roomRef, { balls: balls, turn: (myRole === "host" ? "guest" : "host") });
        }

        const getCoord = (e) => {
            const rect = canvas.getBoundingClientRect();
            const cx = e.touches ? e.touches[0].clientX : e.clientX;
            const cy = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: cx - rect.left, y: cy - rect.top };
        };

        canvas.addEventListener("mousedown", () => { if(turn === myRole) isDragging = true; });
        canvas.addEventListener("touchstart", (e) => { if(turn === myRole) isDragging = true; e.preventDefault(); }, {passive:false});
        window.addEventListener("mousemove", (e) => { mousePos = getCoord(e); });
        window.addEventListener("touchmove", (e) => { mousePos = getCoord(e); });
        window.addEventListener("mouseup", processShot);
        window.addEventListener("touchend", processShot);

        draw();
    </script>
</body>
</html>
